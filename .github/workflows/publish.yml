name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  JAVA_VERSION: "21"
  XCODE_VERSION: "26.4"
  APPLE_SDK_VERSION: "26.4"
  ORG_GRADLE_PROJECT_mavenCentralAutomaticPublishing: "true"

jobs:
  publish-library:
    name: Publish KMP Library
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked --force

      - name: Select Xcode 26.4
        run: |
          set -euo pipefail
          XCODE_APP="/Applications/Xcode_${XCODE_VERSION}.app"
          if [ ! -d "$XCODE_APP" ]; then
            XCODE_APP="$(find /Applications -maxdepth 1 -name "Xcode_${XCODE_VERSION}*.app" | head -n 1)"
          fi
          test -n "$XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          echo "DEVELOPER_DIR=$XCODE_APP/Contents/Developer" >> "$GITHUB_ENV"
          xcodebuild -version
          test "$(xcrun --sdk macosx --show-sdk-version)" = "$APPLE_SDK_VERSION"
          test "$(xcrun --sdk iphoneos --show-sdk-version)" = "$APPLE_SDK_VERSION"
          test "$(xcrun --sdk iphonesimulator --show-sdk-version)" = "$APPLE_SDK_VERSION"

      - name: Prepare iOS Rust artifacts
        run: bash prepare-ios-rust.sh

      - name: Prepare Android Rust artifacts
        run: bash prepare-android-rust.sh

      - name: Publish library to Maven Central
        run: ./gradlew :library:publishAllPublicationsToMavenCentralRepository --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

  publish-desktop-native-unix:
    name: Publish Desktop Native (macOS + Linux)
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig and cargo-zigbuild
        run: |
          brew install zig
          cargo install cargo-zigbuild --locked --force

      - name: Select Xcode 26.4
        run: |
          set -euo pipefail
          XCODE_APP="/Applications/Xcode_${XCODE_VERSION}.app"
          if [ ! -d "$XCODE_APP" ]; then
            XCODE_APP="$(find /Applications -maxdepth 1 -name "Xcode_${XCODE_VERSION}*.app" | head -n 1)"
          fi
          test -n "$XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          echo "DEVELOPER_DIR=$XCODE_APP/Contents/Developer" >> "$GITHUB_ENV"
          xcodebuild -version
          test "$(xcrun --sdk macosx --show-sdk-version)" = "$APPLE_SDK_VERSION"

      - name: Publish desktop native libraries to Maven Central
        run: ./gradlew publishSupportedDesktopNativePublicationsToMavenCentralRepository --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

  publish-desktop-native-windows:
    name: Publish Desktop Native (Windows)
    runs-on: windows-2025
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check Bash
        shell: pwsh
        run: bash --version

      - name: Publish desktop native libraries to Maven Central
        shell: pwsh
        run: .\gradlew.bat publishSupportedDesktopNativePublicationsToMavenCentralRepository --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
